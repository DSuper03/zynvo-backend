name: Deploy to GCP

on:
  push:
    branches:
      - main

# 👇 THIS WAS MISSING (CRITICAL)
permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: project-fb9c80cd-f235-4d28-ac9
  SERVICE: zynvo-backend
  REGION: asia-south1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/274792984950/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@project-fb9c80cd-f235-4d28-ac9.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://asia-south1-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t asia-south1-docker.pkg.dev/$PROJECT_ID/zynvo-repo/zynvo-backend:$GITHUB_SHA .

      - name: Push Docker image
        run: |
          docker push asia-south1-docker.pkg.dev/$PROJECT_ID/zynvo-repo/zynvo-backend:$GITHUB_SHA

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image asia-south1-docker.pkg.dev/$PROJECT_ID/zynvo-repo/zynvo-backend:$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars JWT_SECRET=${{ secrets.JWT_SECRET }},DIRECT_DATABASE_URL=${{ secrets.DIRECT_DATABASE_URL }},REDIS_URL=${{ secrets.REDIS_URL }}
            