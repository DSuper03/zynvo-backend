name: Deploy to GCP

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: project-fb9c80cd-f235-4d28-ac9
  SERVICE: zynvo-backend
  REGION: asia-south1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/274792984950/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@project-fb9c80cd-f235-4d28-ac9.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/zynvo-repo/zynvo-backend:$GITHUB_SHA .

      - name: Push Docker image
        run: |
          docker push asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/zynvo-repo/zynvo-backend:$GITHUB_SHA

      - name: Deploy to Cloud Run
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          FE_URL: ${{ secrets.FE_URL }}
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image asia-south1-docker.pkg.dev/${{ env.PROJECT_ID }}/zynvo-repo/zynvo-backend:$GITHUB_SHA \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "^|^JWT_SECRET=$JWT_SECRET|DIRECT_DATABASE_URL=$DIRECT_DATABASE_URL|DATABASE_URL=$DATABASE_URL|REDIS_URL=$REDIS_URL|SENDGRID_API_KEY=$SENDGRID_API_KEY|FE_URL=$FE_URL"
